# 联邦学习中的客户端数量
num_clients: 10

# 服务端通信轮数，也就是全局训练轮数
server_epochs: 50

# 每轮中每个客户端本地训练的 epoch 数
client_epochs: 1

# 训练设备，例如 cpu 或 cuda
device: cuda

# 客户端本地训练的 round-level 学习率调度器。
# - none / constant / off：保持固定 learning_rate，不做调度。
# - cosine：从 base_lr 余弦退火到 lr_min。
# - cosine_warmup：先 warmup，再余弦退火。
lr_scheduler: cosine

# 余弦退火 / warmup 的最低学习率；为 null 时默认 base_lr * 0.1。
lr_min: 0.00005

# warmup round 数；只在 lr_scheduler=cosine_warmup 时生效。
lr_warmup_rounds: 0

# warmup 的起始学习率；为 null 时默认 lr_min。
lr_warmup_start_lr: 0.00005

# 是否保存每个客户端训练后的 checkpoint：save/{run_name}/model/{client_id}.pth。
# false：推荐。客户端参数会通过内存中的 local_state_dict 直接交给 server 聚合，
#        不再每轮写客户端模型，减少磁盘 I/O 和硬盘占用。
# true：保持旧行为，每个客户端每轮训练结束后额外保存自己的 checkpoint。
# 注意：server.pth、server_bayes_state.pth、CSV 和日志不受这个开关影响，仍会正常保存。
save_client_models: false

# expert_bayes_meta 服务端 Bayes meta update 使用的设备。
# 只影响服务器聚合阶段中每个 expert 的 Bayes meta loss / backward / Adam update，
# 不影响客户端普通训练，也不影响 FedAvg / ExpertFedAvg。
# 可选值：
# - auto：推荐。若 device 是 cuda 且 CUDA 可用，则在 GPU 上做 Bayes meta update；否则自动回退 CPU。
# - cpu：强制服务端 Bayes meta update 使用 CPU，最稳但通常较慢。
# - cuda：强制使用默认 CUDA 设备；如果 CUDA 不可用会回退 CPU。
# - cuda:0 / cuda:1：指定某张 GPU 做服务端 Bayes meta update。
# 计算完成后 model_state / server_bayes_state.pth 仍会转回 CPU 保存。
bayes_meta_device: auto

# 是否在每轮服务端 Bayes 聚合结束后调用 torch.cuda.empty_cache()。
# false：推荐，速度更快，PyTorch 会复用显存缓存。
# true：显存紧张或多实验共用同一张卡时可打开，但会降低速度。
# 只影响 expert_bayes_meta 的服务端聚合阶段。
bayes_empty_cache_after_aggregation: false

# 是否在每个客户端完成整轮 Bayes evidence extraction 后清理 CUDA cache。
# false：推荐，避免每个 client / 每轮频繁清 cache 带来的额外开销。
# true：如果 evidence extraction 后显存占用影响后续 client，可打开。
# 注意：现在不会在每个 expert 后清 cache，只会在整个客户端 evidence 完成后按需清理。
bayes_empty_cache_after_client_evidence: false

# 是否在每轮联邦训练结束后清理 CUDA cache。
# false：推荐，减少反复 empty_cache 带来的训练变慢。
# true：如果你在多实验共卡或显存紧张，可打开，但会牺牲一点速度。
# 只在 device 是 cuda 且 CUDA 可用时生效。
empty_cache_after_round: false

# Bayes evidence batch cache 存放设备。
# 这个 cache 是客户端本地训练后，为每个 active expert 保存的少量输入 batch，
# 后续 SGLD 会反复读取这些 batch 来估计 local_mean / local_precision。
# 可选值：
# - cpu：默认旧行为。cache 放 CPU，最省显存，但 SGLD 每次会 CPU -> GPU 搬运。
# - cuda：cache 直接放 self.device，对 SGLD 更快，但会多占 GPU 显存。
# - auto：若 self.device 是 cuda 且 bayes_evidence_batches <= 4，则放 GPU；否则放 CPU。
# 如果出现 CUDA OOM，优先把这里改回 cpu。
# 日志中可看 --bayes_cache_diag 的 cached_batch_device 和 estimated_cache_memory_mb。
bayes_cache_device: cpu

# 实验输出根目录；最终会自动派生 save/{run_name}/data|model|result
save_root: save

# 本次实验名；开新实验时优先只改这个字段
run_name: exp1

# false 时，如果本次实验的目标输出目录已经非空，会直接报错防止覆盖
allow_overwrite: false

# 续跑开关：
# false：新实验，仍然受 allow_overwrite 保护。
# true：从 save/{run_name}/model/resume_checkpoint.pth 续跑，日志和 CSV 追加写入。
resume: false

# null 表示默认使用 save/{run_name}/model/resume_checkpoint.pth
resume_checkpoint_path: null

# 允许旧版本输出文件 fallback：
# 没有 resume_checkpoint.pth 时，尝试用 server.pth + server CSV 推断轮数。
# expert_bayes_meta 还需要 server_bayes_state.pth。
resume_allow_legacy_checkpoint: true

# 是否启用 tqdm 进度条总开关
use_tqdm: true

# 是否显示 round/client 级动态进度条；false 时只保留每轮 clean summary
progress_bar: true

# tqdm 动态条是否在完成后保留在终端里
progress_bar_leave: false

# tqdm 动态刷新的最小间隔，避免日志太密
progress_bar_mininterval: 1.0

# tqdm 进度条总宽度；固定宽度更容易显示完整的 unicode bar
progress_ncols: 140

# clean progress summary 的日志间隔；当前默认每轮都会打印
progress_log_interval: 1

# stdout 不是 tty 时，是否强制显示动态 tqdm；默认 false，nohup/重定向时会自动退化为纯日志
progress_force_tty: false

# 预留开关：是否显示 expert 级进度条；当前默认关闭
progress_expert_bar: false

# 聚合方法：
# - fedavg
# - expert_fedavg
# - expert_bayes_meta
agg_method: expert_fedavg

# Bayesian expert aggregation

# 客户端局部证据提取模式。
# 可选：
# - adam_noise: 旧逻辑。Adam optimizer + Langevin noise 注入到 gradient 上。
# - two_stage_plain: 先 Adam 找 local MAP，再用手写 plain SGLD 采样。
bayes_sgld_fit_mode: adam_noise

# --- adam_noise 专用参数 ---
# 只有 bayes_sgld_fit_mode: adam_noise 时使用。

# 客户端局部证据提取阶段的 SGLD / optimizer 迭代步数
bayes_sgld_steps: 10

# SGLD burn-in 步数；小于总步数
bayes_sgld_burnin: 5

# 客户端提取局部 expert 证据时的 SGLD 学习率
bayes_sgld_lr: 0.00005

# --- two_stage_plain 专用参数 ---
# 只有 bayes_sgld_fit_mode: two_stage_plain 时使用。

# 阶段 1：Adam MAP 步数
bayes_map_steps: 8

# 阶段 1：Adam MAP 学习率；空值/null 表示使用 bayes_sgld_lr
bayes_map_lr:

# 阶段 2：plain SGLD 总步数
bayes_plain_sgld_steps: 32

# 阶段 2：plain SGLD burn-in 步数
bayes_plain_sgld_burnin: 16

# 阶段 2：plain SGLD 手写参数更新学习率
bayes_plain_sgld_lr: 0.000001

# 阶段 2：plain SGLD Langevin 温度；噪声尺度为 sqrt(2 * lr * temperature)
bayes_sgld_temperature: 1.0

# 阶段 2：plain SGLD 噪声独立缩放；最终噪声尺度为该值 * sqrt(2 * lr * temperature)
bayes_plain_sgld_noise_scale: 1.0

# 阶段 2：data_loss 梯度缩放，用于诊断梯度更新过弱
bayes_plain_sgld_loss_scale: 1.0

# 阶段 2：以 MAP 参数为中心的二次 prior precision；0 表示不加 MAP 回拉项
bayes_plain_sgld_prior_precision: 0.0

# 阶段 2：burn-in 后每隔多少步收集一次参数样本
bayes_plain_sgld_sample_interval: 1

# --- 两种证据提取模式共用参数 ---

# 局部样本方差下限；floor_inverse 模式下会用它做 variance floor
bayes_sgld_var_floor: 0.0

# 对角精度上限，防止局部方差过小导致数值不稳定
bayes_ai_max: 1000.0

# local posterior precision 估计模式。
# 可选：
# - floor_inverse: 旧默认逻辑，precision = 1 / clamp(raw_var, bayes_sgld_var_floor)
# - normalized_power: 对 raw_var 做 power tempering 后归一化到 target
# - scalar_normalized_power: 每个参数张量共享一个 normalized_power precision
# - relative_normalized_power: 先按 mean_state 参数尺度归一化 raw_var，再做 normalized_power
bayes_precision_mode: floor_inverse

# normalized_power / scalar_normalized_power / relative_normalized_power 的 power 温度
bayes_precision_temperature: 0.25

# normalized_power / relative_normalized_power 的目标 precision 均值；沿用当前 main 默认值
bayes_precision_target: 100.0

# normalized_power / relative_normalized_power 的 precision 下限；沿用当前 main 默认值
bayes_precision_min: 20.0

# normalized_power / relative_normalized_power 的 precision 上限；沿用当前 main 默认值
bayes_precision_max: 300.0

# precision 计算时的数值稳定 eps
bayes_precision_eps: 1.0e-12

# 每个 expert 在客户端最多抽多少个 batch 来估计局部证据
bayes_evidence_batches: 4

# 只有当 expert 实际处理 token 数达到该阈值时，才为它生成贝叶斯证据
bayes_min_expert_tokens: 128

# 服务端每轮对一个 expert 的元更新步数
bayes_meta_steps: 2

# 服务端元更新学习率
bayes_meta_lr: 0.0005

# 全局先验精度 gamma0 的初始值
bayes_gamma0_init: 1.0

# 全局先验强度 n0 的初始值
bayes_n0_init: 1.0

# 是否更新全局先验精度
bayes_update_precision: true

# 是否更新全局先验强度
bayes_update_strength: true
