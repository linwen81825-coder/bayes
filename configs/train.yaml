# 联邦学习中的客户端数量
num_clients: 10

# 服务端通信轮数，也就是全局训练轮数
server_epochs: 50

# 每轮中每个客户端本地训练的 epoch 数
client_epochs: 1

# 训练设备，例如 cpu 或 cuda
device: cuda

# expert_bayes_meta 服务端 Bayes meta update 使用的设备。
# 只影响服务器聚合阶段中每个 expert 的 Bayes meta loss / backward / Adam update，
# 不影响客户端普通训练，也不影响 FedAvg / ExpertFedAvg。
# 可选值：
# - auto：推荐。若 device 是 cuda 且 CUDA 可用，则在 GPU 上做 Bayes meta update；否则自动回退 CPU。
# - cpu：强制服务端 Bayes meta update 使用 CPU，最稳但通常较慢。
# - cuda：强制使用默认 CUDA 设备；如果 CUDA 不可用会回退 CPU。
# - cuda:0 / cuda:1：指定某张 GPU 做服务端 Bayes meta update。
# 计算完成后 model_state / server_bayes_state.pth 仍会转回 CPU 保存。
bayes_meta_device: auto

# 是否在每轮服务端 Bayes 聚合结束后调用 torch.cuda.empty_cache()。
# false：推荐，速度更快，PyTorch 会复用显存缓存。
# true：显存紧张或多实验共用同一张卡时可打开，但会降低速度。
# 只影响 expert_bayes_meta 的服务端聚合阶段。
bayes_empty_cache_after_aggregation: false

# 是否在每个客户端完成整轮 Bayes evidence extraction 后清理 CUDA cache。
# false：推荐，避免每个 client / 每轮频繁清 cache 带来的额外开销。
# true：如果 evidence extraction 后显存占用影响后续 client，可打开。
# 注意：现在不会在每个 expert 后清 cache，只会在整个客户端 evidence 完成后按需清理。
bayes_empty_cache_after_client_evidence: false

# Bayes evidence batch cache 存放设备。
# 这个 cache 是客户端本地训练后，为每个 active expert 保存的少量输入 batch，
# 后续 SGLD 会反复读取这些 batch 来估计 local_mean / local_precision。
# 可选值：
# - cpu：默认旧行为。cache 放 CPU，最省显存，但 SGLD 每次会 CPU -> GPU 搬运。
# - cuda：cache 直接放 self.device，对 SGLD 更快，但会多占 GPU 显存。
# - auto：若 self.device 是 cuda 且 bayes_evidence_batches <= 4，则放 GPU；否则放 CPU。
# 如果出现 CUDA OOM，优先把这里改回 cpu。
# 日志中可看 --bayes_cache_diag 的 cached_batch_device 和 estimated_cache_memory_mb。
bayes_cache_device: cpu

# 实验输出根目录；最终会自动派生 save/{run_name}/data|model|result
save_root: save

# 本次实验名；开新实验时优先只改这个字段
run_name: exp1

# false 时，如果本次实验的目标输出目录已经非空，会直接报错防止覆盖
allow_overwrite: false

# 聚合方法：
# - fedavg
# - expert_fedavg
# - expert_bayes_meta
agg_method: expert_fedavg

# Bayesian expert aggregation:
# 客户端局部证据提取阶段的 SGLD 迭代步数
bayes_sgld_steps: 10

# SGLD burn-in 步数；小于总步数
bayes_sgld_burnin: 5

# 客户端提取局部 expert 证据时的 SGLD 学习率
bayes_sgld_lr: 0.00005

# 对角精度上限，防止局部方差过小导致数值不稳定
bayes_ai_max: 1000.0

# 每个 expert 在客户端最多抽多少个 batch 来估计局部证据
bayes_evidence_batches: 4

# 只有当 expert 实际处理 token 数达到该阈值时，才为它生成贝叶斯证据
bayes_min_expert_tokens: 128

# 服务端每轮对一个 expert 的元更新步数
bayes_meta_steps: 2

# 服务端元更新学习率
bayes_meta_lr: 0.0005

# 全局先验精度 gamma0 的初始值
bayes_gamma0_init: 1.0

# 全局先验强度 n0 的初始值
bayes_n0_init: 1.0

# 是否更新全局先验精度
bayes_update_precision: true

# 是否更新全局先验强度
bayes_update_strength: true
